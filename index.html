<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Real Estate SaaS Dashboard</title>

<link rel="stylesheet" href="style.css" />

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <h2>Real Estate Dashboard</h2>
  <input type="email" id="email" placeholder="Enter your email" />
  <button onclick="login()">Enter Dashboard</button>
</div>

<!-- MAIN APP -->
<div class="app" id="app" style="display:none;">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>My Deals</h2>
    <p id="user-email"></p>
    <button onclick="logout()">Logout</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <h1>Deal Dashboard</h1>

    <!-- Stats -->
    <div class="stats">
      <div class="card">
        <h3>Total Deals</h3>
        <p id="total-deals">0</p>
      </div>
      <div class="card">
        <h3>Avg MAO (Maximum Allowed Offer)</h3>
        <p id="avg-mao">$0</p>
      </div>
    </div>

    <!-- Calculator -->
    <div class="card">
      <h3>New Deal</h3>

      <input type="number" id="arv" placeholder="ARV (After Repair Value)">
      <input type="number" id="repairs" placeholder="Repair Costs">
      <input type="number" id="profit" value="30" placeholder="Profit %">
      <input type="number" id="assignment" placeholder="Assignment Fee">
      <input type="number" id="closing" value="0" placeholder="Closing Costs">

      <button id="calculate-btn">Calculate Deal</button>

      <p id="result"></p>
      <div id="success" class="success-message">Deal saved ✅</div>

      <canvas id="dealChart"></canvas>
    </div>

    <!-- Deals -->
    <div class="card">
      <h3>Saved Deals</h3>
      <div id="deals-list"></div>
    </div>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
